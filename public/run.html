<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Run — detalle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-slate-900 text-slate-100 antialiased">
  <header class="bg-slate-800 border-b border-slate-700 p-4 shadow-sm z-10 relative">
    <div class="max-w-[1600px] w-full mx-auto flex items-center justify-between px-2">
      <div>
        <a href="javascript:history.back()" class="text-slate-300 hover:text-white">← Volver</a>
      </div>
      <div id="run-info" class="text-sm text-slate-300"></div>
      <div id="run-status-badge"></div>
    </div>
  </header>

  <div id="error" class="error-banner hidden" style="margin:16px"></div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p class="text-slate-400">Cargando run…</p>
  </div>

  <!-- Split layout: sidebar + log panel -->
  <div id="run-layout" class="run-layout hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="run-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title" id="sidebar-title">Jobs in run</div>
        <div class="sidebar-pipeline-name" id="sidebar-pipeline-name"></div>
      </div>
      <div id="sidebar-body" class="sidebar-body"></div>
    </aside>

    <!-- Log panel -->
    <section id="log-panel" class="run-log-panel">
      <div class="log-panel-header" id="log-panel-header">
        <div class="log-panel-title" id="log-panel-title">
          <span class="log-job-icon" id="log-job-icon"></span>
          <span id="log-job-name">Selecciona un job</span>
        </div>
        <div class="log-panel-actions" id="log-panel-actions">
          <button id="btn-log-copy" class="log-action-btn" title="Copiar log">📋 Copy</button>
          <button id="btn-log-download" class="log-action-btn" title="Descargar log">💾 Download</button>
          <button id="btn-log-wrap" class="log-action-btn" title="Toggle wrap">↩️ Wrap</button>
          <button id="btn-log-timestamp" class="log-action-btn" title="Mostrar timestamps">🕐 Timestamps</button>
          <button id="btn-log-follow" class="log-action-btn active" title="Auto-follow">⬇️ Follow</button>
        </div>
      </div>
      <div class="log-panel-body" id="log-panel-body">
        <div class="log-placeholder" id="log-placeholder">
          <p>👈 Selecciona un job del sidebar para ver su log</p>
        </div>
        <div class="log-loading hidden" id="log-loading">
          <div class="spinner-sm"></div> Cargando log…
        </div>
        <pre class="log-content hidden" id="log-content"></pre>
      </div>
    </section>
  </div>

  <script src="run.js"></script>
</body>

</html>
