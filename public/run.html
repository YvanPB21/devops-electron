<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Run — detalle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-slate-900 text-slate-100 antialiased">
    <header class="bg-slate-800 border-b border-slate-700 p-4">
      <div class="w-full mx-4 flex items-center justify-between">
        <div>
          <a href="index.html" class="text-slate-300 hover:text-white">← Volver</a>
        </div>
        <div id="run-info" class="text-sm text-slate-300"></div>
      </div>
    </header>

    <main class="w-full mx-4 p-6">
      <div id="error" class="error-banner hidden"></div>

      <div id="content">
        <div id="loading" class="loading">
          <div class="spinner"></div>
          <p class="text-slate-400">Cargando run…</p>
        </div>

        <div id="timeline" class="hidden">
          <h2 class="text-lg font-semibold mb-4">Timeline / Steps</h2>
          <div id="timeline-body" class="space-y-3"></div>
        </div>
      </div>
    </main>

    <script src="run.js"></script>
  </body>
</html>
