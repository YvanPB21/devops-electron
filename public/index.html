<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure DevOps — Pipeline Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
</head>

<body class="bg-slate-900 text-slate-100 antialiased">
  <header class="bg-slate-800 border-b border-slate-700 p-4 md:p-6 shadow-sm">
    <div class="max-w-[1600px] w-full mx-auto flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center gap-4">
        <h1 class="text-lg md:text-2xl font-semibold">🚀 Pipeline Dashboard</h1>
        <div class="header-meta text-sm text-slate-400">
          <span id="org-project" class="mr-4"></span>
          <span id="last-update"></span>
        </div>
      </div>

      <div class="header-actions flex items-center gap-3">
        <label class="flex items-center gap-2 text-sm text-slate-300">
          <input type="checkbox" id="auto-refresh" checked class="form-checkbox h-4 w-4 text-sky-500" />
          <span>Auto-refresh (30s)</span>
        </label>

        <label class="flex items-center gap-2 text-sm text-slate-300">
          <span>Agrupar por:</span>
          <select id="group-by" class="bg-slate-700 text-slate-100 text-sm rounded px-2 py-1">
            <option value="none">Ninguno</option>
            <option value="project">Proyecto</option>
            <option value="environment" selected>Ambiente</option>
          </select>
        </label>

        <label class="flex items-center gap-2 text-sm text-slate-300">
          <input type="checkbox" id="folder-filter" checked class="form-checkbox h-4 w-4 text-sky-500" />
          <span>Solo carpeta:</span>
          <input id="folder-path" type="text" value="\Backend\bcv-bacc\"
            class="bg-slate-700 text-slate-100 text-sm rounded px-2 py-1 w-52" />
        </label>

        <button id="btn-refresh" title="Refrescar ahora"
          class="bg-sky-500 hover:bg-sky-600 text-white px-3 py-1.5 rounded-md font-medium">⟳ Refrescar</button>
        <button id="btn-settings" title="Ajustes"
          class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-md font-medium">⚙ Ajustes</button>
      </div>
    </div>
  </header>

  <main class="max-w-[1600px] w-full mx-auto py-6 px-4 md:px-8">
    <div id="error-banner" class="error-banner hidden"></div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p class="text-slate-400">Cargando pipelines…</p>
    </div>

    <div id="table-container" class="hidden">
      <div class="table-wrapper w-full overflow-x-auto rounded-xl border border-slate-700 shadow-lg bg-slate-800/50">
        <table class="min-w-full divide-y divide-slate-700">
          <thead class="bg-slate-800">
            <tr>
              <th class="px-4 py-3 text-center" style="width:40px"><input type="checkbox" id="select-all"
                  class="pipeline-checkbox" title="Seleccionar todos" /></th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Pipeline</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Estado</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Resultado</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Fecha</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Duración</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Link</th>
              <th class="px-4 py-3 text-left text-xs font-semibold text-slate-400 uppercase">Folder</th>
            </tr>
          </thead>
          <tbody id="pipeline-body" class="bg-slate-900"></tbody>
        </table>
      </div>

      <div class="summary mt-4" id="summary"></div>
    </div>
  </main>

  <!-- Floating bulk action bar -->
  <div id="bulk-action-bar" class="bulk-action-bar">
    <span class="bulk-info"><strong id="bulk-count">0</strong> pipelines seleccionados</span>
    <button id="btn-bulk-run" class="btn-bulk-run">🚀 Run Selected</button>
    <button id="btn-bulk-clear" class="btn-bulk-clear">✕ Limpiar</button>
  </div>

  <script src="app.js"></script>
</body>

</html>
